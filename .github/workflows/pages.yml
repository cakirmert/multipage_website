# Deploy the static/ folder to GitHub Pages on every push to a feature branch.
# This is what lets reviewers see a live preview of any branch — including
# pull-request branches — at https://<owner>.github.io/<repo>/.
#
# Repo settings → Pages → Source must be set to "GitHub Actions" once for this
# to take effect. (One-time, then every push to the configured branches builds
# automatically.)

name: Deploy static site to Pages

on:
  push:
    branches: ["master", "main", "client-side-port"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # Serve the static/ folder verbatim. No build step required — every
          # asset (HTML, JS, WASM, JSON) is already a shippable artefact.
          path: ./static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
